<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 to-sky-300 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="mx-auto w-16 h-16 rounded-full bg-sky-600 flex items-center justify-center text-3xl">🧺</div>
      <h1 class="text-xl font-bold mt-3 text-slate-800">Laundry Kiloan</h1>
      <p class="text-sm text-slate-500">Sistem Informasi Manajemen Laundry</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input type="text" id="username" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="owner / budi / siti">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" id="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="password123">
      </div>
      <div id="errorBox" class="hidden bg-red-50 text-red-600 text-sm rounded-lg px-3 py-2"></div>
      <button type="submit" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg py-2 transition">Masuk</button>
    </form>

    <div class="mt-6 text-xs text-slate-400 text-center">
      Akun test: owner / budi / siti — password: password123
    </div>
    <div class="mt-3 text-center">
      <a href="wa-simulation.html" target="_blank" class="text-xs text-sky-600 hover:underline">📱 Lihat WA Pelanggan</a>
    </div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('errorBox');
  errorBox.classList.add('hidden');

  try {
    const res = await fetch('api/auth/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorBox.textContent = data.error || 'Login gagal';
      errorBox.classList.remove('hidden');
      return;
    }
    if (data.user.role === 'Owner') {
      window.location.href = 'dashboard-owner.html';
    } else {
      window.location.href = 'dashboard-karyawan.html';
    }
  } catch (err) {
    errorBox.textContent = 'Tidak dapat terhubung ke server';
    errorBox.classList.remove('hidden');
  }
});
</script>
</body>
</html>
