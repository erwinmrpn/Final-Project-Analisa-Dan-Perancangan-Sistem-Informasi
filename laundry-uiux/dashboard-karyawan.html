<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Karyawan - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
  <div class="p-5 border-b border-slate-200">
    <div class="font-bold text-sky-700 text-lg">🧺 Laundry Kiloan</div>
    <div class="text-xs text-slate-400">Panel Karyawan</div>
  </div>
  <nav class="flex-1 p-3 space-y-1">
    <a href="dashboard-karyawan.html" class="block px-3 py-2 rounded-lg bg-sky-50 text-sky-700 font-medium">🏠 Dashboard</a>
    <a href="input-pesanan.html" class="block px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100">📝 Input Pesanan</a>
    <a href="daftar-pesanan.html" class="block px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100">📋 Daftar Pesanan</a>
    <a href="wa-simulation.html" target="_blank" class="block px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100">📱 Lihat WA Pelanggan</a>
  </nav>
  <div class="p-4 border-t border-slate-200">
    <div class="text-sm font-medium text-slate-700" id="userNama">-</div>
    <button id="logoutBtn" class="text-xs text-red-500 hover:underline mt-1">🚪 Logout</button>
  </div>
</aside>

<main class="flex-1 p-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-6" id="greeting">Halo!</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
      <div class="text-sm text-slate-500">Pesanan Masuk Hari Ini</div>
      <div class="text-3xl font-bold text-sky-700 mt-1" id="statMasuk">0</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
      <div class="text-sm text-slate-500">Pesanan Selesai Hari Ini</div>
      <div class="text-3xl font-bold text-green-700 mt-1" id="statSelesai">0</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
      <div class="text-sm text-slate-500">Pendapatan Hari Ini</div>
      <div class="text-3xl font-bold text-amber-700 mt-1" id="statPendapatan">Rp 0</div>
    </div>
  </div>

  <div class="flex items-center justify-between mb-3">
    <h2 class="text-lg font-semibold text-slate-800">Pesanan Aktif Hari Ini</h2>
    <a href="input-pesanan.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold rounded-lg px-4 py-2">+ Input Pesanan Baru</a>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-500 text-left">
        <tr>
          <th class="px-4 py-3">No. Pesanan</th>
          <th class="px-4 py-3">Pelanggan</th>
          <th class="px-4 py-3">Layanan</th>
          <th class="px-4 py-3">Berat</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelPesanan"></tbody>
    </table>
  </div>
</main>

<script src="js/app.js"></script>
<script>
(async () => {
  const user = await checkAuth(false);
  if (!user) return;
  document.getElementById('greeting').textContent = `Halo, ${user.nama}! Selamat bekerja.`;
  setupLogout();
  await loadStats();
  await loadPesanan();
})();

async function loadStats() {
  const res = await fetch('api/dashboard/karyawan.php');
  const data = await res.json();
  document.getElementById('statMasuk').textContent = data.pesanan_masuk_hari_ini;
  document.getElementById('statSelesai').textContent = data.pesanan_selesai_hari_ini;
  document.getElementById('statPendapatan').textContent = formatRupiah(data.pendapatan_hari_ini);
}

async function loadPesanan() {
  const res = await fetch('api/pesanan/list.php?hari_ini=1');
  const data = await res.json();
  const aktif = data.pesanan.filter(p => p.status !== 'Selesai');
  const tbody = document.getElementById('tabelPesanan');
  if (aktif.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-center text-slate-400">Tidak ada pesanan aktif hari ini</td></tr>';
    return;
  }
  tbody.innerHTML = aktif.map(p => `
    <tr class="border-t border-slate-100">
      <td class="px-4 py-3 font-medium">${p.id}</td>
      <td class="px-4 py-3">${p.pelanggan_nama}</td>
      <td class="px-4 py-3">${p.layanan}</td>
      <td class="px-4 py-3">${p.berat_kg} kg</td>
      <td class="px-4 py-3">${statusBadge(p.status)}</td>
      <td class="px-4 py-3 space-x-2">
        <a href="daftar-pesanan.html" class="text-sky-600 hover:underline">Kelola</a>
      </td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
