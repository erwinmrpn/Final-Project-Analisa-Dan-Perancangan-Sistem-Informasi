<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Pesanan - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef4ff', 100: '#dbe6fe', 200: '#bcd0fe', 300: '#8ab0fd',
            400: '#5688fa', 500: '#3466f6', 600: '#1f47ea', 700: '#1a37c4',
            800: '#1a309d', 900: '#1a2e7c', 950: '#141d4a'
          }
        }
      }
    }
  }
</script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<div id="sidebarSlot"></div>

<div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
  <div id="headerSlot"></div>

  <main class="flex-1 overflow-y-auto p-4 sm:p-8">
  <div class="flex gap-2 mb-4 flex-wrap" id="filterBar">
    <button data-filter="" class="filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-gradient-to-r from-brand-600 to-brand-700 text-white shadow-sm shadow-brand-200">Semua</button>
    <button data-filter="Masuk" class="filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-brand-300">Masuk</button>
    <button data-filter="Proses" class="filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-brand-300">Proses</button>
    <button data-filter="Selesai" class="filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-brand-300">Selesai</button>
    <button data-filter="hari_ini" class="filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-brand-300">Hari Ini</button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-500 text-left">
        <tr>
          <th class="px-4 py-3">No. Pesanan</th>
          <th class="px-4 py-3">Pelanggan</th>
          <th class="px-4 py-3">No. HP</th>
          <th class="px-4 py-3">Layanan</th>
          <th class="px-4 py-3">Berat</th>
          <th class="px-4 py-3">Total Biaya</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Tgl Masuk</th>
          <th class="px-4 py-3">Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelPesanan"></tbody>
    </table>
  </div>
  </main>
</div>

<!-- Modal Detail -->
<div id="modalDetail" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-[1px] flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md">
    <h3 class="font-semibold text-lg mb-3 text-slate-800">Detail Pesanan</h3>
    <div id="modalContent" class="text-sm space-y-1.5"></div>
    <button id="btnTutupModal" class="mt-5 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl py-2 transition">Tutup</button>
  </div>
</div>

<script src="js/app.js"></script>
<script>
let filterAktif = '';

(async () => {
  const user = await initPage({ requireOwner: false, title: 'Daftar Pesanan' });
  if (!user) return;
  await loadPesanan();
})();

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-brand-300');
    btn.className = 'filter-btn px-3.5 py-1.5 rounded-full text-sm font-medium bg-gradient-to-r from-brand-600 to-brand-700 text-white shadow-sm shadow-brand-200';
    filterAktif = btn.dataset.filter;
    loadPesanan();
  });
});

async function loadPesanan() {
  let url = 'api/pesanan/list.php?';
  if (filterAktif === 'hari_ini') url += 'hari_ini=1';
  else if (filterAktif) url += 'status=' + filterAktif;
  const res = await fetch(url);
  const data = await res.json();
  const tbody = document.getElementById('tabelPesanan');
  if (data.pesanan.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-6 text-center text-slate-400">Tidak ada data</td></tr>';
    return;
  }
  const next = { 'Masuk': 'Proses', 'Proses': 'Selesai' };
  tbody.innerHTML = data.pesanan.map(p => `
    <tr class="border-t border-slate-100">
      <td class="px-4 py-3 font-medium">${p.id}</td>
      <td class="px-4 py-3">${p.pelanggan_nama}</td>
      <td class="px-4 py-3">${p.no_hp}</td>
      <td class="px-4 py-3">${p.layanan}</td>
      <td class="px-4 py-3">${p.berat_kg} kg</td>
      <td class="px-4 py-3">${formatRupiah(p.total_biaya)}</td>
      <td class="px-4 py-3">${statusBadge(p.status)}</td>
      <td class="px-4 py-3">${formatTanggal(p.tanggal_masuk)}</td>
      <td class="px-4 py-3 space-x-2 whitespace-nowrap">
        ${next[p.status] ? `<button data-id="${p.id}" data-next="${next[p.status]}" class="btnUpdateStatus text-brand-600 hover:underline text-xs">Update Status</button>` : ''}
        ${!p.sudah_bayar ? `<a href="proses-pembayaran.html?pesanan_id=${p.id}" class="text-emerald-600 hover:underline text-xs">Proses Bayar</a>` : ''}
        <button data-id="${p.id}" class="btnDetail text-slate-500 hover:underline text-xs">Lihat Detail</button>
      </td>
    </tr>
  `).join('');

  document.querySelectorAll('.btnUpdateStatus').forEach(btn => {
    btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.next));
  });
  document.querySelectorAll('.btnDetail').forEach(btn => {
    btn.addEventListener('click', () => lihatDetail(btn.dataset.id));
  });
}

async function updateStatus(id, next) {
  if (!confirm(`Ubah status ke ${next}?`)) return;
  const res = await fetch('api/pesanan/update_status.php', {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  if (data.notifikasi_wa_terkirim) {
    alert('Status diubah ke Selesai. Notifikasi WA telah dikirim ke pelanggan.');
  }
  loadPesanan();
}

async function lihatDetail(id) {
  const res = await fetch('api/pesanan/detail.php?id=' + id);
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  const p = data.pesanan;
  const baris = (label, value) => `<div class="flex justify-between py-1.5 border-b border-slate-50 last:border-0"><span class="text-slate-500">${label}</span><span class="font-medium text-slate-800 text-right">${value}</span></div>`;
  document.getElementById('modalContent').innerHTML =
    baris('No. Pesanan', p.id) +
    baris('Pelanggan', `${p.pelanggan_nama} (${p.no_hp})`) +
    baris('Layanan', p.layanan) +
    baris('Berat', `${p.berat_kg} kg`) +
    baris('Total Biaya', formatRupiah(p.total_biaya)) +
    baris('Status', statusBadge(p.status)) +
    baris('Tgl Masuk', formatTanggal(p.tanggal_masuk)) +
    baris('Sudah Bayar', p.sudah_bayar ? 'Ya' : 'Belum');
  document.getElementById('modalDetail').classList.remove('hidden');
}

document.getElementById('btnTutupModal').addEventListener('click', () => {
  document.getElementById('modalDetail').classList.add('hidden');
});
</script>
</body>
</html>
