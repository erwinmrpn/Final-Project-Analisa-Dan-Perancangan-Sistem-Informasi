<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Karyawan - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef4ff', 100: '#dbe6fe', 200: '#bcd0fe', 300: '#8ab0fd',
            400: '#5688fa', 500: '#3466f6', 600: '#1f47ea', 700: '#1a37c4',
            800: '#1a309d', 900: '#1a2e7c', 950: '#141d4a'
          }
        }
      }
    }
  }
</script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<div id="sidebarSlot"></div>

<div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
  <div id="headerSlot"></div>

  <main class="flex-1 overflow-y-auto p-4 sm:p-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6" id="greeting">Halo!</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100 flex items-start gap-4">
        <span class="w-11 h-11 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0" id="iconMasuk"></span>
        <div>
          <div class="text-sm text-slate-500">Pesanan Masuk Hari Ini</div>
          <div class="text-3xl font-bold text-slate-800 mt-0.5" id="statMasuk">0</div>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100 flex items-start gap-4">
        <span class="w-11 h-11 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0" id="iconSelesai"></span>
        <div>
          <div class="text-sm text-slate-500">Pesanan Selesai Hari Ini</div>
          <div class="text-3xl font-bold text-slate-800 mt-0.5" id="statSelesai">0</div>
        </div>
      </div>
      <div class="rounded-2xl shadow-lg shadow-brand-200 p-5 bg-gradient-to-br from-brand-600 to-brand-800 text-white flex items-start gap-4 relative overflow-hidden">
        <div class="absolute -right-6 -bottom-8 w-28 h-28 rounded-full bg-white/10"></div>
        <span class="w-11 h-11 rounded-xl bg-white/15 flex items-center justify-center shrink-0 relative" id="iconPendapatan"></span>
        <div class="relative">
          <div class="text-sm text-brand-100">Pendapatan Hari Ini</div>
          <div class="text-3xl font-bold mt-0.5" id="statPendapatan">Rp 0</div>
        </div>
      </div>
    </div>

    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
      <h2 class="text-lg font-semibold text-slate-800">Pesanan Aktif Hari Ini</h2>
      <a href="input-pesanan.html" class="flex items-center gap-2 bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white text-sm font-semibold rounded-xl px-4 py-2.5 shadow-md shadow-brand-200 transition">
        <span id="iconPlus"></span> Input Pesanan Baru
      </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500 text-left">
          <tr>
            <th class="px-4 py-3">No. Pesanan</th>
            <th class="px-4 py-3">Pelanggan</th>
            <th class="px-4 py-3">Layanan</th>
            <th class="px-4 py-3">Berat</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelPesanan"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
(async () => {
  const user = await initPage({ requireOwner: false, title: 'Dashboard' });
  if (!user) return;
  document.getElementById('greeting').textContent = `Halo, ${user.nama}! Selamat bekerja.`;
  document.getElementById('iconMasuk').innerHTML = icon('list', 'w-5 h-5');
  document.getElementById('iconSelesai').innerHTML = icon('checkCircle', 'w-5 h-5');
  document.getElementById('iconPendapatan').innerHTML = icon('cash', 'w-5 h-5');
  document.getElementById('iconPlus').innerHTML = icon('plus', 'w-4 h-4');
  await loadStats();
  await loadPesanan();
})();

async function loadStats() {
  const res = await fetch('api/dashboard/karyawan.php');
  const data = await res.json();
  document.getElementById('statMasuk').textContent = data.pesanan_masuk_hari_ini;
  document.getElementById('statSelesai').textContent = data.pesanan_selesai_hari_ini;
  document.getElementById('statPendapatan').textContent = formatRupiah(data.pendapatan_hari_ini);
}

async function loadPesanan() {
  const res = await fetch('api/pesanan/list.php?hari_ini=1');
  const data = await res.json();
  const aktif = data.pesanan.filter(p => p.status !== 'Selesai');
  const tbody = document.getElementById('tabelPesanan');
  if (aktif.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-center text-slate-400">Tidak ada pesanan aktif hari ini</td></tr>';
    return;
  }
  tbody.innerHTML = aktif.map(p => `
    <tr class="border-t border-slate-100">
      <td class="px-4 py-3 font-medium">${p.id}</td>
      <td class="px-4 py-3">${p.pelanggan_nama}</td>
      <td class="px-4 py-3">${p.layanan}</td>
      <td class="px-4 py-3">${p.berat_kg} kg</td>
      <td class="px-4 py-3">${statusBadge(p.status)}</td>
      <td class="px-4 py-3 space-x-2">
        <a href="daftar-pesanan.html" class="text-brand-600 hover:underline">Kelola</a>
      </td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
