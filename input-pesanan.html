<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pesanan - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef4ff', 100: '#dbe6fe', 200: '#bcd0fe', 300: '#8ab0fd',
            400: '#5688fa', 500: '#3466f6', 600: '#1f47ea', 700: '#1a37c4',
            800: '#1a309d', 900: '#1a2e7c', 950: '#141d4a'
          }
        }
      }
    }
  }
</script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<div id="sidebarSlot"></div>

<div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
  <div id="headerSlot"></div>

  <main class="flex-1 overflow-y-auto p-4 sm:p-8 max-w-2xl">
  <!-- STEP 1: Pilih Pelanggan -->
  <div id="step1" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <span class="w-7 h-7 rounded-full bg-brand-600 text-white text-sm font-bold flex items-center justify-center shrink-0">1</span>
        <h2 class="font-semibold text-slate-800">Pilih Pelanggan</h2>
      </div>
      <button id="btnToggleBaru" class="text-sm font-medium text-brand-600 hover:underline">+ Daftarkan Pelanggan Baru</button>
    </div>

    <div id="pilihPelangganWrap">
      <label class="block text-sm font-medium text-slate-700 mb-1">Pelanggan Terdaftar</label>
      <div class="flex gap-2">
        <select id="selectPelanggan" class="flex-1 min-w-0 border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">— Pilih pelanggan —</option>
        </select>
        <button id="btnPilih" class="bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-semibold rounded-xl px-4 py-2 shadow-md shadow-brand-200 transition">Pilih</button>
      </div>
    </div>

    <div id="formPelangganBaru" class="hidden space-y-3 border-t border-slate-100 pt-4 mt-4">
      <p class="text-sm text-slate-500 font-medium">Daftarkan Pelanggan Baru</p>
      <input id="namaBaru" type="text" placeholder="Nama pelanggan" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
      <input id="noHpBaru" type="text" placeholder="Nomor HP" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
      <input id="alamatBaru" type="text" placeholder="Alamat (opsional)" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
      <button id="btnDaftar" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Daftarkan & Lanjut</button>
    </div>

    <div id="pelangganDitemukan" class="hidden mt-4 bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-200 rounded-xl px-4 py-3 text-sm"></div>
  </div>

  <!-- STEP 2: Input Pesanan -->
  <div id="step2" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="w-7 h-7 rounded-full bg-brand-600 text-white text-sm font-bold flex items-center justify-center shrink-0">2</span>
      <h2 class="font-semibold text-slate-800">Input Pesanan</h2>
    </div>
    <p class="text-sm text-slate-500 mb-3">Pelanggan: <span class="font-semibold text-slate-800" id="namaPelangganTampil"></span></p>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Layanan</label>
        <select id="layananSelect" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="Reguler">Reguler — Rp 7.000/kg</option>
          <option value="Express">Express — Rp 12.000/kg</option>
          <option value="Cuci+Setrika">Cuci+Setrika — Rp 10.000/kg</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Berat Cucian (kg)</label>
        <input id="beratInput" type="number" min="0.1" step="0.1" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="contoh: 3.5">
      </div>
    </div>

    <div class="bg-brand-50 rounded-xl px-4 py-3 text-sm mb-3">
      Total Biaya: <span class="font-bold text-brand-700" id="totalPreview">Rp 0</span>
    </div>

    <div class="grid grid-cols-3 gap-2 text-xs text-slate-500 mb-4">
      <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="font-medium text-slate-700">Reguler</div>Rp 7.000/kg</div>
      <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="font-medium text-slate-700">Express</div>Rp 12.000/kg</div>
      <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="font-medium text-slate-700">Cuci+Setrika</div>Rp 10.000/kg</div>
    </div>

    <button id="btnLanjutKonfirmasi" class="bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-semibold rounded-xl px-4 py-2 shadow-md shadow-brand-200 transition">Lanjut ke Konfirmasi</button>
  </div>

  <!-- STEP 3: Konfirmasi -->
  <div id="step3" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="w-7 h-7 rounded-full bg-brand-600 text-white text-sm font-bold flex items-center justify-center shrink-0">3</span>
      <h2 class="font-semibold text-slate-800">Konfirmasi &amp; Pilih Pembayaran</h2>
    </div>
    <div class="bg-slate-50 rounded-xl p-4 text-sm space-y-1 mb-4" id="ringkasan"></div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-slate-700 mb-1">Metode Pembayaran (jika Bayar Sekarang)</label>
      <select id="metodeSelect" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
        <option value="Cash">Cash</option>
        <option value="Transfer">Transfer</option>
        <option value="E-wallet">E-wallet</option>
      </select>
    </div>

    <div class="flex gap-3">
      <button id="btnBayarSekarang" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl py-2 shadow-md shadow-emerald-100 transition">Bayar Sekarang</button>
      <button id="btnBayarNanti" class="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold rounded-xl py-2 transition">Bayar Nanti</button>
    </div>
  </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
let pelanggan = null;
let layanan = 'Reguler';
let berat = 0;
let totalBiaya = 0;
let pesananId = null;

const HARGA = { 'Reguler': 7000, 'Express': 12000, 'Cuci+Setrika': 10000 };

(async () => {
  const user = await initPage({ requireOwner: false, title: 'Input Pesanan Baru' });
  if (!user) return;
  await muatDaftarPelanggan();
})();

async function muatDaftarPelanggan() {
  const res = await fetch('api/pelanggan/list.php');
  const data = await res.json();
  const select = document.getElementById('selectPelanggan');
  select.innerHTML = '<option value="">— Pilih pelanggan —</option>' +
    data.pelanggan.map(p => `<option value="${p.id}">${p.nama} — ${p.no_hp}</option>`).join('');
}

document.getElementById('btnToggleBaru').addEventListener('click', () => {
  const form = document.getElementById('formPelangganBaru');
  const wrap = document.getElementById('pilihPelangganWrap');
  const isHidden = form.classList.contains('hidden');
  form.classList.toggle('hidden', !isHidden);
  wrap.classList.toggle('hidden', isHidden);
  document.getElementById('btnToggleBaru').textContent = isHidden ? '← Pilih dari Daftar' : '+ Daftarkan Pelanggan Baru';
});

document.getElementById('btnPilih').addEventListener('click', () => {
  const id = document.getElementById('selectPelanggan').value;
  if (!id) { alert('Pilih pelanggan terlebih dahulu'); return; }
  const opt = document.getElementById('selectPelanggan').selectedOptions[0];
  pelanggan = { id, nama: opt.textContent.split(' — ')[0] };
  document.getElementById('pelangganDitemukan').classList.remove('hidden');
  document.getElementById('pelangganDitemukan').textContent = `Pelanggan dipilih: ${pelanggan.nama}`;
  lanjutKeStep2();
});

document.getElementById('btnDaftar').addEventListener('click', async () => {
  const no_hp = document.getElementById('noHpBaru').value.trim();
  const nama = document.getElementById('namaBaru').value.trim();
  const alamat = document.getElementById('alamatBaru').value.trim();
  if (!nama || !no_hp) { alert('Nama dan nomor HP wajib diisi'); return; }
  const res = await fetch('api/pelanggan/create.php', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nama, no_hp, alamat })
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  pelanggan = data.pelanggan;
  document.getElementById('pelangganDitemukan').classList.remove('hidden');
  document.getElementById('pelangganDitemukan').textContent = `Pelanggan baru terdaftar: ${pelanggan.nama}`;
  lanjutKeStep2();
});

function lanjutKeStep2() {
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('namaPelangganTampil').textContent = pelanggan.nama;
  updatePreview();
}

document.getElementById('layananSelect').addEventListener('change', updatePreview);
document.getElementById('beratInput').addEventListener('input', updatePreview);

function updatePreview() {
  layanan = document.getElementById('layananSelect').value;
  berat = parseFloat(document.getElementById('beratInput').value) || 0;
  totalBiaya = berat * HARGA[layanan];
  document.getElementById('totalPreview').textContent = formatRupiah(totalBiaya);
}

document.getElementById('btnLanjutKonfirmasi').addEventListener('click', () => {
  if (berat <= 0) { alert('Berat cucian harus lebih dari 0'); return; }
  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('ringkasan').innerHTML = `
    <div>Pelanggan: <b>${pelanggan.nama}</b></div>
    <div>Layanan: <b>${layanan}</b></div>
    <div>Berat: <b>${berat} kg</b></div>
    <div>Total Biaya: <b>${formatRupiah(totalBiaya)}</b></div>
  `;
});

async function simpanPesanan() {
  const res = await fetch('api/pesanan/create.php', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pelanggan_id: pelanggan.id, layanan, berat_kg: berat })
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return null; }
  return data.pesanan.id;
}

document.getElementById('btnBayarSekarang').addEventListener('click', async () => {
  const id = await simpanPesanan();
  if (!id) return;
  const metode_pembayaran = document.getElementById('metodeSelect').value;
  const res = await fetch('api/pembayaran/create.php', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pesanan_id: id, jumlah_bayar: totalBiaya, metode_pembayaran })
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  alert('Pesanan berhasil dibuat & lunas! Nota dan struk telah dikirim ke WA pelanggan.');
  window.location.href = 'daftar-pesanan.html';
});

document.getElementById('btnBayarNanti').addEventListener('click', async () => {
  const id = await simpanPesanan();
  if (!id) return;
  alert('Pesanan berhasil dibuat! Nota telah dikirim ke WA pelanggan.');
  window.location.href = 'daftar-pesanan.html';
});
</script>
</body>
</html>
