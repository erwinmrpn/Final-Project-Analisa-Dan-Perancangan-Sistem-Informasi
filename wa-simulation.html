<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi WhatsApp - Pelanggan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/wa-style.css">
</head>
<body class="wa-page-bg min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-[2rem] wa-phone overflow-hidden flex flex-col" style="height: 90vh;">

  <!-- Pilih Pelanggan -->
  <div id="pilihPelanggan" class="p-8 flex-1 flex flex-col justify-center bg-gradient-to-b from-white to-slate-50">
    <div class="text-center mb-8">
      <div class="mx-auto w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center text-4xl shadow-lg shadow-emerald-200 mb-4">📱</div>
      <h1 class="text-xl font-bold text-slate-800">Masuk sebagai Pelanggan</h1>
      <p class="text-sm text-slate-500 mt-1">Pilih nomor HP Anda untuk membuka WhatsApp</p>
    </div>
    <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Nomor HP</label>
    <select id="selectKontak" class="border border-slate-300 rounded-xl px-3 py-2.5 mb-4 focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
    <button id="btnBuka" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold rounded-xl py-2.5 shadow-md shadow-emerald-200 transition">Buka WhatsApp</button>
  </div>

  <!-- Chat WA -->
  <div id="chatWa" class="hidden flex-1 min-h-0 flex flex-col relative">
    <div class="wa-header text-white px-4 py-3 flex items-center gap-3 shadow-md z-10">
      <button id="btnKembali" class="text-2xl leading-none">←</button>
      <div class="w-10 h-10 rounded-full bg-white/90 flex items-center justify-center font-bold text-emerald-700 text-sm shrink-0">LK</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm truncate">Laundry Kiloan</div>
        <div class="text-xs text-emerald-100 flex items-center gap-1">
          <span class="wa-online-dot"></span>
          <span id="chatNoHp">-</span>
        </div>
      </div>
      <div class="text-lg opacity-90">📞</div>
    </div>

    <div id="daftarPesan" class="wa-bg wa-scrollbar flex-1 min-h-0 overflow-y-auto p-4 space-y-3"></div>

    <button id="btnScrollBottom" class="hidden absolute right-4 bottom-20 bg-white text-emerald-600 rounded-full w-9 h-9 items-center justify-center wa-scroll-btn text-lg">↓</button>

    <div class="p-2.5 flex items-center gap-2 border-t border-slate-200 bg-slate-50 z-10">
      <input disabled type="text" placeholder="Ketik pesan..." class="flex-1 border border-slate-300 rounded-full px-4 py-2 text-sm bg-white text-slate-400">
      <button id="btnRefresh" class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-md shrink-0 transition active:scale-95">⟳</button>
    </div>
  </div>
</div>

<script>
let noHpAktif = null;
let pollInterval = null;

(async () => {
  const res = await fetch('api/wa/contacts.php');
  const data = await res.json();
  const select = document.getElementById('selectKontak');
  select.innerHTML = data.kontak.map(k => `<option value="${k.no_hp}">${k.nama} — ${k.no_hp}</option>`).join('');
})();

document.getElementById('btnBuka').addEventListener('click', () => {
  noHpAktif = document.getElementById('selectKontak').value;
  if (!noHpAktif) return;
  document.getElementById('pilihPelanggan').classList.add('hidden');
  document.getElementById('chatWa').classList.remove('hidden');
  document.getElementById('chatNoHp').textContent = noHpAktif;
  loadPesan(true);
  pollInterval = setInterval(() => loadPesan(false), 5000);
});

document.getElementById('btnKembali').addEventListener('click', () => {
  clearInterval(pollInterval);
  document.getElementById('chatWa').classList.add('hidden');
  document.getElementById('pilihPelanggan').classList.remove('hidden');
});

document.getElementById('btnRefresh').addEventListener('click', () => loadPesan(true));

const TIPE_META = {
  nota: { kelas: 'wa-bubble-nota', label: '🧺 Nota Pesanan' },
  status: { kelas: 'wa-bubble-status', label: '✅ Update Status' },
  struk: { kelas: 'wa-bubble-struk', label: '🧾 Struk Pembayaran' },
};

function labelTanggal(tgl) {
  const d = new Date(tgl + 'T00:00:00');
  const hariIni = new Date();
  const kemarin = new Date();
  kemarin.setDate(hariIni.getDate() - 1);
  const fmt = (x) => x.toISOString().slice(0, 10);
  if (fmt(d) === fmt(hariIni)) return 'Hari Ini';
  if (fmt(d) === fmt(kemarin)) return 'Kemarin';
  return new Intl.DateTimeFormat('id-ID', { dateStyle: 'long' }).format(d);
}

async function loadPesan(forceScroll) {
  const container = document.getElementById('daftarPesan');
  const nearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;

  const res = await fetch('api/wa/inbox.php?no_hp=' + encodeURIComponent(noHpAktif));
  const data = await res.json();

  if (data.pesan.length === 0) {
    container.innerHTML = '<div class="text-center text-xs text-slate-400 mt-8">💬 Belum ada pesan</div>';
    return;
  }

  let lastTanggal = null;
  let html = '';
  data.pesan.forEach(p => {
    const tglKey = p.tanggal.slice(0, 10);
    if (tglKey !== lastTanggal) {
      html += `<div class="flex justify-center my-2"><span class="wa-date-pill">${labelTanggal(tglKey)}</span></div>`;
      lastTanggal = tglKey;
    }
    const jam = new Date(p.tanggal.replace(' ', 'T')).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    const meta = TIPE_META[p.tipe] || { kelas: '', label: '' };
    html += `
      <div class="flex justify-end">
        <div class="wa-bubble ${meta.kelas} px-3 py-2 max-w-[85%] text-sm text-slate-800">
          ${escapeHtml(p.isi_pesan)}
          <div class="text-[10px] text-slate-400 text-right mt-1">${jam} <span class="text-sky-500">✓✓</span></div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;

  if (forceScroll || nearBottom) {
    container.scrollTop = container.scrollHeight;
  }
  updateScrollButton();
}

function updateScrollButton() {
  const container = document.getElementById('daftarPesan');
  const btn = document.getElementById('btnScrollBottom');
  const jauhDariBawah = container.scrollHeight - container.scrollTop - container.clientHeight > 150;
  btn.classList.toggle('hidden', !jauhDariBawah);
  btn.classList.toggle('flex', jauhDariBawah);
}

document.getElementById('daftarPesan').addEventListener('scroll', updateScrollButton);
document.getElementById('btnScrollBottom').addEventListener('click', () => {
  const container = document.getElementById('daftarPesan');
  container.scrollTop = container.scrollHeight;
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
