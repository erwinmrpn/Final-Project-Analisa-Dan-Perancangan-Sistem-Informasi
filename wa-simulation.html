<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi WhatsApp - Pelanggan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/wa-style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col" style="height: 90vh;">

  <!-- Pilih Pelanggan -->
  <div id="pilihPelanggan" class="p-6 flex-1 flex flex-col justify-center">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">📱</div>
      <h1 class="text-lg font-bold text-slate-800">Masuk sebagai Pelanggan</h1>
      <p class="text-sm text-slate-500">Pilih nomor HP Anda untuk membuka WhatsApp</p>
    </div>
    <select id="selectKontak" class="border border-slate-300 rounded-lg px-3 py-2 mb-4"></select>
    <button id="btnBuka" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg py-2">Buka WhatsApp</button>
  </div>

  <!-- Chat WA -->
  <div id="chatWa" class="hidden flex-1 flex flex-col">
    <div class="wa-header text-white px-4 py-3 flex items-center gap-3">
      <button id="btnKembali" class="text-xl">←</button>
      <div class="w-9 h-9 rounded-full bg-slate-300 flex items-center justify-center font-bold text-slate-700 text-sm">LK</div>
      <div class="flex-1">
        <div class="font-semibold text-sm">Laundry Kiloan</div>
        <div class="text-xs text-emerald-100" id="chatNoHp">-</div>
      </div>
      <div class="text-lg">📞</div>
    </div>

    <div id="daftarPesan" class="wa-bg flex-1 overflow-y-auto p-4 space-y-2"></div>

    <div class="p-2 flex items-center gap-2 border-t border-slate-200 bg-slate-50">
      <input disabled type="text" placeholder="Ketik pesan..." class="flex-1 border border-slate-300 rounded-full px-4 py-2 text-sm bg-slate-100 text-slate-400">
      <button id="btnRefresh" class="bg-emerald-600 text-white rounded-full w-9 h-9 flex items-center justify-center">⟳</button>
    </div>
  </div>
</div>

<script>
let noHpAktif = null;
let pollInterval = null;

(async () => {
  const res = await fetch('api/wa/contacts.php');
  const data = await res.json();
  const select = document.getElementById('selectKontak');
  select.innerHTML = data.kontak.map(k => `<option value="${k.no_hp}">${k.nama} — ${k.no_hp}</option>`).join('');
})();

document.getElementById('btnBuka').addEventListener('click', () => {
  noHpAktif = document.getElementById('selectKontak').value;
  if (!noHpAktif) return;
  document.getElementById('pilihPelanggan').classList.add('hidden');
  document.getElementById('chatWa').classList.remove('hidden');
  document.getElementById('chatNoHp').textContent = noHpAktif;
  loadPesan();
  pollInterval = setInterval(loadPesan, 5000);
});

document.getElementById('btnKembali').addEventListener('click', () => {
  clearInterval(pollInterval);
  document.getElementById('chatWa').classList.add('hidden');
  document.getElementById('pilihPelanggan').classList.remove('hidden');
});

document.getElementById('btnRefresh').addEventListener('click', loadPesan);

async function loadPesan() {
  const res = await fetch('api/wa/inbox.php?no_hp=' + encodeURIComponent(noHpAktif));
  const data = await res.json();
  const container = document.getElementById('daftarPesan');
  if (data.pesan.length === 0) {
    container.innerHTML = '<div class="text-center text-xs text-slate-400 mt-4">Belum ada pesan</div>';
    return;
  }
  container.innerHTML = data.pesan.map(p => {
    const jam = new Date(p.tanggal.replace(' ', 'T')).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="flex justify-end">
        <div class="wa-bubble px-3 py-2 max-w-[80%] text-sm text-slate-800">
          ${escapeHtml(p.isi_pesan)}
          <div class="text-[10px] text-slate-400 text-right mt-1">${jam} <span class="text-sky-500">✓✓</span></div>
        </div>
      </div>
    `;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
