<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proses Pembayaran - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef4ff', 100: '#dbe6fe', 200: '#bcd0fe', 300: '#8ab0fd',
            400: '#5688fa', 500: '#3466f6', 600: '#1f47ea', 700: '#1a37c4',
            800: '#1a309d', 900: '#1a2e7c', 950: '#141d4a'
          }
        }
      }
    }
  }
</script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<div id="sidebarSlot"></div>

<div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
  <div id="headerSlot"></div>

  <main class="flex-1 overflow-y-auto p-4 sm:p-8 max-w-lg">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
    <div id="detailPesanan" class="text-sm mb-5"></div>

    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Jumlah Bayar</label>
        <input id="jumlahBayar" type="number" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Metode Pembayaran</label>
        <select id="metode" class="w-full border border-slate-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="Cash">Cash</option>
          <option value="Transfer">Transfer</option>
          <option value="E-wallet">E-wallet</option>
        </select>
      </div>
      <button id="btnProses" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl py-2 shadow-md shadow-emerald-100 transition">Proses Pembayaran</button>
    </div>

    <div id="suksesBox" class="hidden mt-4 bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-200 rounded-xl px-4 py-3 text-sm"></div>
  </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pesananId = params.get('pesanan_id');
let pesanan = null;

(async () => {
  const user = await initPage({ requireOwner: false, title: 'Proses Pembayaran' });
  if (!user) return;
  await loadPesanan();
})();

async function loadPesanan() {
  if (!pesananId) { alert('ID pesanan tidak ditemukan'); return; }
  const res = await fetch('api/pesanan/detail.php?id=' + pesananId);
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  pesanan = data.pesanan;
  const baris = (label, value) => `<div class="flex justify-between py-1.5 border-b border-slate-50 last:border-0"><span class="text-slate-500">${label}</span><span class="font-medium text-slate-800">${value}</span></div>`;
  document.getElementById('detailPesanan').innerHTML =
    baris('No. Pesanan', pesanan.id) +
    baris('Nama Pelanggan', pesanan.pelanggan_nama) +
    baris('Layanan', pesanan.layanan) +
    baris('Berat', `${pesanan.berat_kg} kg`) +
    baris('Total Biaya', `<span class="text-brand-700 font-bold">${formatRupiah(pesanan.total_biaya)}</span>`);
  document.getElementById('jumlahBayar').value = pesanan.total_biaya;
}

document.getElementById('btnProses').addEventListener('click', async () => {
  const jumlah_bayar = parseFloat(document.getElementById('jumlahBayar').value);
  const metode_pembayaran = document.getElementById('metode').value;
  const res = await fetch('api/pembayaran/create.php', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pesanan_id: pesananId, jumlah_bayar, metode_pembayaran })
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  document.getElementById('suksesBox').classList.remove('hidden');
  document.getElementById('suksesBox').textContent = 'Pembayaran berhasil! Struk telah dikirim ke WA pelanggan.';
  document.getElementById('btnProses').disabled = true;
  setTimeout(() => window.location.href = 'daftar-pesanan.html', 2000);
});
</script>
</body>
</html>
