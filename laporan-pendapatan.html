<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Pendapatan - Laundry Kiloan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

<div id="sidebarSlot"></div>

<div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
  <div id="headerSlot"></div>

  <main class="flex-1 overflow-y-auto p-4 sm:p-8">
  <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 mb-6 flex flex-wrap items-end gap-3">
    <div>
      <label class="block text-sm text-slate-600 mb-1">Tanggal Awal</label>
      <input id="dari" type="date" class="border border-slate-300 rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Tanggal Akhir</label>
      <input id="sampai" type="date" class="border border-slate-300 rounded-lg px-3 py-2">
    </div>
    <button id="btnTampilkan" class="bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg px-4 py-2">Tampilkan</button>
    <button id="btnSimpan" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg px-4 py-2">Simpan Laporan</button>
  </div>

  <div id="hasil" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
        <div class="text-sm text-slate-500">Total Pendapatan</div>
        <div class="text-2xl font-bold text-sky-700 mt-1" id="rTotal">Rp 0</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
        <div class="text-sm text-slate-500">Total Pesanan</div>
        <div class="text-2xl font-bold text-green-700 mt-1" id="rPesanan">0</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
        <div class="text-sm text-slate-500">Rata-rata / Pesanan</div>
        <div class="text-2xl font-bold text-amber-700 mt-1" id="rRata">Rp 0</div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 mb-6">
      <canvas id="chartHarian" height="90"></canvas>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500 text-left">
          <tr>
            <th class="px-4 py-3">No. Transaksi</th>
            <th class="px-4 py-3">Pesanan</th>
            <th class="px-4 py-3">Pelanggan</th>
            <th class="px-4 py-3">Layanan</th>
            <th class="px-4 py-3">Jumlah Bayar</th>
            <th class="px-4 py-3">Metode</th>
            <th class="px-4 py-3">Tanggal</th>
          </tr>
        </thead>
        <tbody id="tabelTransaksi"></tbody>
      </table>
    </div>
  </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
let lastData = null;
let chart = null;

(async () => {
  const user = await initPage({ requireOwner: true, title: 'Laporan Pendapatan' });
  if (!user) return;
  const hariIni = new Date();
  const awalBulan = new Date(hariIni.getFullYear(), hariIni.getMonth(), 1);
  document.getElementById('dari').value = awalBulan.toISOString().slice(0, 10);
  document.getElementById('sampai').value = hariIni.toISOString().slice(0, 10);
  await tampilkanLaporan();
})();

document.getElementById('btnTampilkan').addEventListener('click', tampilkanLaporan);

async function tampilkanLaporan() {
  const dari = document.getElementById('dari').value;
  const sampai = document.getElementById('sampai').value;
  if (!dari || !sampai) { alert('Isi periode terlebih dahulu'); return; }
  const res = await fetch(`api/laporan/pendapatan.php?dari=${dari}&sampai=${sampai}`);
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  lastData = { ...data, periode_awal: dari, periode_akhir: sampai };

  document.getElementById('hasil').classList.remove('hidden');
  document.getElementById('rTotal').textContent = formatRupiah(data.total_pendapatan);
  document.getElementById('rPesanan').textContent = data.total_pesanan;
  document.getElementById('rRata').textContent = formatRupiah(data.rata_rata);

  const labels = Object.keys(data.per_hari);
  const values = Object.values(data.per_hari);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chartHarian'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Pendapatan per Hari', data: values, backgroundColor: '#0284c7' }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });

  document.getElementById('tabelTransaksi').innerHTML = data.transaksi.map(t => `
    <tr class="border-t border-slate-100">
      <td class="px-4 py-3">${t.transaksi_id}</td>
      <td class="px-4 py-3">${t.pesanan_id}</td>
      <td class="px-4 py-3">${t.pelanggan_nama}</td>
      <td class="px-4 py-3">${t.layanan}</td>
      <td class="px-4 py-3">${formatRupiah(t.jumlah_bayar)}</td>
      <td class="px-4 py-3">${t.metode_pembayaran}</td>
      <td class="px-4 py-3">${formatTanggal(t.tanggal)}</td>
    </tr>
  `).join('') || '<tr><td colspan="7" class="px-4 py-6 text-center text-slate-400">Tidak ada transaksi</td></tr>';
}

document.getElementById('btnSimpan').addEventListener('click', async () => {
  if (!lastData) { alert('Tampilkan laporan terlebih dahulu'); return; }
  const res = await fetch('api/laporan/simpan_pendapatan.php', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(lastData)
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  alert('Laporan berhasil disimpan');
});
</script>
</body>
</html>
